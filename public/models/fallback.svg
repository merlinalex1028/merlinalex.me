<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Cute sitting cat mascot -->
  <g transform="translate(100, 150)">
    <!-- Body -->
    <ellipse cx="0" cy="40" rx="50" ry="60" fill="#FF6B9D" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="-40" r="45" fill="#FF6B9D"/>
    <!-- Left ear -->
    <polygon points="-35,-70 -20,-100 -5,-70" fill="#FF6B9D"/>
    <polygon points="-30,-72 -20,-92 -10,-72" fill="#FFB6C8"/>
    <!-- Right ear -->
    <polygon points="5,-70 20,-100 35,-70" fill="#FF6B9D"/>
    <polygon points="10,-72 20,-92 30,-72" fill="#FFB6C8"/>
    <!-- Eyes -->
    <ellipse cx="-15" cy="-45" rx="6" ry="8" fill="#333"/>
    <ellipse cx="15" cy="-45" rx="6" ry="8" fill="#333"/>
    <!-- Eye highlights -->
    <circle cx="-13" cy="-48" r="2.5" fill="#fff"/>
    <circle cx="17" cy="-48" r="2.5" fill="#fff"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-32" rx="3" ry="2" fill="#FFB6C8"/>
    <!-- Mouth -->
    <path d="M-8,-28 Q0,-22 8,-28" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Whiskers -->
    <line x1="-45" y1="-35" x2="-20" y2="-32" stroke="#333" stroke-width="1" opacity="0.6"/>
    <line x1="-45" y1="-28" x2="-20" y2="-28" stroke="#333" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="-32" x1="45" y2="-35" stroke="#333" stroke-width="1" opacity="0.6"/>
    <line x1="20" y1="-28" x2="45" y2="-28" stroke="#333" stroke-width="1" opacity="0.6"/>
    <!-- Tail -->
    <path d="M40,60 Q70,30 60,0" stroke="#FF6B9D" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Greeting text -->
  <text x="100" y="270" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#FF6B9D" font-weight="600">喵~</text>
</svg>
